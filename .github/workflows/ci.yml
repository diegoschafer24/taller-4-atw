name: CI Taller AES

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        python-version: [3.8, 3.12]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r taller_2_ev/requirements.txt

      - name: Run tests
        run: pytest -v taller_2_ev

      - name: Check formatting
        run: black --check taller_2_ev

